name: Code Quality Checks

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ros2/bunker_ros2/bunker_3d_nav/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ros2/bunker_ros2/bunker_3d_nav/**'

jobs:
  lint:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install linting tools
      run: |
        pip install flake8 black isort mypy bandit safety
        pip install open3d numpy scipy matplotlib seaborn pandas
        
    - name: Run flake8
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        flake8 bunker_3d_nav/ --max-line-length=88 --extend-ignore=E203,W503 --statistics
        
    - name: Run black
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        black --check --diff bunker_3d_nav/
        
    - name: Run isort
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        isort --check-only --diff bunker_3d_nav/
        
    - name: Run mypy
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        mypy bunker_3d_nav/ --ignore-missing-imports --strict-optional
        
    - name: Run bandit
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        bandit -r bunker_3d_nav/ -f json -o bandit-report.json || true
        
    - name: Run safety
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        safety check --json --output safety-report.json || true
        
    - name: Check docstring coverage
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        pip install interrogate
        interrogate bunker_3d_nav/ --fail-under=80 --ignore-init-method --ignore-init-module
        
    - name: Check import order
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        python -c "
        import ast
        import os
        
        def check_imports(filepath):
            with open(filepath, 'r') as f:
                try:
                    tree = ast.parse(f.read())
                    for node in ast.walk(tree):
                        if isinstance(node, ast.Import):
                            for alias in node.names:
                                if alias.name.startswith('bunker_3d_nav'):
                                    print(f'Relative import found in {filepath}: {alias.name}')
                except:
                    pass
        
        for root, dirs, files in os.walk('bunker_3d_nav'):
            for file in files:
                if file.endswith('.py'):
                    check_imports(os.path.join(root, file))
        "
        
    - name: Check for TODO comments
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        grep -r "TODO" bunker_3d_nav/ || echo "No TODO comments found"
        
    - name: Check for FIXME comments
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        grep -r "FIXME" bunker_3d_nav/ || echo "No FIXME comments found"
        
    - name: Check for XXX comments
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        grep -r "XXX" bunker_3d_nav/ || echo "No XXX comments found"
        
    - name: Check for print statements
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        grep -r "print(" bunker_3d_nav/ || echo "No print statements found"
        
    - name: Check for debugger statements
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        grep -r "pdb\|ipdb\|breakpoint" bunker_3d_nav/ || echo "No debugger statements found"
        
    - name: Check for hardcoded values
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        grep -r "0\.1\|0\.2\|0\.5\|1\.0\|2\.0\|5\.0\|10\.0" bunker_3d_nav/ || echo "No hardcoded values found"
        
    - name: Check for unused imports
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        pip install unimport
        unimport bunker_3d_nav/ --check || true
        
    - name: Check for duplicate code
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        pip install pycodestyle
        pycodestyle bunker_3d_nav/ --statistics || true
        
    - name: Check for complexity
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        pip install radon
        radon cc bunker_3d_nav/ --min B --show-complexity
        
    - name: Check for maintainability
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        radon mi bunker_3d_nav/ --min B
        
    - name: Check for raw metrics
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        radon raw bunker_3d_nav/ --summary
        
    - name: Upload linting reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: linting-reports
        path: |
          ros2/bunker_ros2/bunker_3d_nav/bandit-report.json
          ros2/bunker_ros2/bunker_3d_nav/safety-report.json

