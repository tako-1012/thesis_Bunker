name: Python Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ros2/bunker_ros2/bunker_3d_nav/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ros2/bunker_ros2/bunker_3d_nav/**'

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: [3.10, 3.11]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist
        pip install flake8 black isort mypy
        
    - name: Lint with flake8
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        flake8 bunker_3d_nav/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 bunker_3d_nav/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
        
    - name: Check code formatting with black
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        black --check bunker_3d_nav/
        
    - name: Check import sorting with isort
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        isort --check-only bunker_3d_nav/
        
    - name: Type check with mypy
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        mypy bunker_3d_nav/ --ignore-missing-imports
        
    - name: Run tests with pytest
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        pytest test/ -v --cov=bunker_3d_nav --cov-report=xml --cov-report=html --cov-report=term-missing
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ros2/bunker_ros2/bunker_3d_nav/coverage.xml
        flags: python
        name: python-coverage
        fail_ci_if_error: true
        
    - name: Run performance tests
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        pytest test/ -k "performance" -v --durations=10
        
    - name: Run integration tests
      run: |
        cd ros2/bunker_ros2/bunker_3d_nav
        pytest test/test_integration.py -v
        
    - name: Archive test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-python-${{ matrix.python-version }}
        path: |
          ros2/bunker_ros2/bunker_3d_nav/htmlcov/
          ros2/bunker_ros2/bunker_3d_nav/coverage.xml
          ros2/bunker_ros2/bunker_3d_nav/.pytest_cache/

