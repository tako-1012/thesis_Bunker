controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    left_wheel_names  : ['front_left_wheel_joint','rear_left_wheel_joint']
    right_wheel_names : ['front_right_wheel_joint','rear_right_wheel_joint']

    wheel_separation : 0.55
    wheel_radius : 0.16
    wheels_per_side: 1
    wheel_separation_multiplier : 4.5
    left_wheel_radius_multiplier : 0.6
    right_wheel_radius_multiplier : 0.6

    odom_frame_id: wheel_odom
    base_frame_id: base_link
    
    pose_covariance_diagonal : [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]

    enable_odom_tf: true

    cmd_vel_timeout: 3.0
    publish_limited_velocity: true
    velocity_rolling_window_size: 10

    linear:
      x:
        has_velocity_limits    : true
        max_velocity           : 0.5   # m/s real 1.5
        has_acceleration_limits: true
        max_acceleration       : 0.5   # m/s^2
    angular:
      z:
        has_velocity_limits    : true
        max_velocity           : 0.6   # rad/s
        has_acceleration_limits: true
        max_acceleration       : 1.6   # rad/s^2

